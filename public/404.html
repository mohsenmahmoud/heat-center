<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>هيت سنتر</title>
    <script>
      // GitHub Pages SPA redirect trick (rafgraph/spa-github-pages).
      // Stashes the real path and bounces to the app root so client-side
      // routing can take over — GitHub Pages has no server-side rewrite.
      sessionStorage.redirect = location.href
      location.replace('/heat-center/')
    </script>
  </head>
  <body></body>
</html>
