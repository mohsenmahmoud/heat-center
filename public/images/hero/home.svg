<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b1d08" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#101b28"/>
      <stop offset="100%" stop-color="#0a121c"/>
    </linearGradient>
    <radialGradient id="hglow1" cx="0.24" cy="0.28" r="0.5">
      <stop offset="0%" stop-color="#f2540e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f2540e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hglow2" cx="0.78" cy="0.72" r="0.45">
      <stop offset="0%" stop-color="#1c87db" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1c87db" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hgrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.035"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#hbg)"/>
  <rect width="1200" height="800" fill="url(#hgrid)"/>
  <rect width="1200" height="800" fill="url(#hglow1)"/>
  <rect width="1200" height="800" fill="url(#hglow2)"/>

  <!-- house silhouette -->
  <g stroke="#ff7a33" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M320 520 V330 L600 180 L880 330 V520 Z" fill="#101b28" fill-opacity="0.55"/>
    <path d="M320 520 V330 L600 180 L880 330 V520 Z"/>
    <rect x="540" y="400" width="120" height="120" rx="8"/>
    <rect x="390" y="360" width="80" height="80" rx="6"/>
    <rect x="730" y="360" width="80" height="80" rx="6"/>
  </g>

  <!-- warmth waves inside house -->
  <g stroke="#ffa366" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M420 300 q18 -30 0 -60 q-18 -30 0 -60"/>
    <path d="M600 280 q18 -30 0 -60 q-18 -30 0 -60"/>
    <path d="M780 300 q18 -30 0 -60 q-18 -30 0 -60"/>
  </g>

  <!-- sun -->
  <g stroke="#ffa366" fill="none" stroke-width="6" stroke-linecap="round">
    <circle cx="940" cy="220" r="46" fill="#f2540e" fill-opacity="0.3"/>
    <line x1="940" y1="140" x2="940" y2="110"/>
    <line x1="874" y1="154" x2="852" y2="132"/>
    <line x1="1006" y1="154" x2="1028" y2="132"/>
    <line x1="850" y1="220" x2="822" y2="220"/>
  </g>

  <!-- water drop / plumbing accent -->
  <g stroke="#3fa6f5" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M260 620 c0 24 -20 40 -44 40 s-44 -16 -44 -40 c0 -28 44 -70 44 -70 s44 42 44 70 Z"
      fill="#1c87db" fill-opacity="0.25"/>
  </g>

  <!-- radiator icon accent bottom right -->
  <g stroke="#ff7a33" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(940,560)">
    <rect x="0" y="0" width="150" height="90" rx="10" fill="#101b28" fill-opacity="0.6"/>
    <line x1="24" y1="8" x2="24" y2="82"/>
    <line x1="54" y1="8" x2="54" y2="82"/>
    <line x1="84" y1="8" x2="84" y2="82"/>
    <line x1="114" y1="8" x2="114" y2="82"/>
  </g>

  <!-- ground line -->
  <line x1="80" y1="660" x2="1120" y2="660" stroke="#ffa366" stroke-opacity="0.2" stroke-width="3"/>
</svg>
