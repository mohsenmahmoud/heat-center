<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b1d08" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#101b28"/>
      <stop offset="100%" stop-color="#0a121c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.28" r="0.55">
      <stop offset="0%" stop-color="#f2540e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f2540e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <rect width="800" height="600" fill="url(#glow)"/>


  <g stroke="#ff7a33" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- compact wall-mounted instant heater unit -->
    <rect x="320" y="190" width="160" height="260" rx="16" fill="#101b28" fill-opacity="0.65"/>
    <rect x="320" y="190" width="160" height="260" rx="16"/>
    <rect x="345" y="220" width="110" height="60" rx="8" opacity="0.6"/>
    <circle cx="400" cy="335" r="26"/>
    <line x1="400" y1="380" x2="400" y2="410"/>
    <!-- wall mount brackets -->
    <line x1="300" y1="230" x2="320" y2="230"/>
    <line x1="480" y1="230" x2="500" y2="230"/>
    <line x1="300" y1="410" x2="320" y2="410"/>
    <line x1="480" y1="410" x2="500" y2="410"/>
    <!-- pipes in/out -->
    <path d="M320 230 H260 V460"/>
    <path d="M480 410 H540 V460"/>
    <circle cx="260" cy="300" r="9" fill="#f2540e" fill-opacity="0.5"/>
    <circle cx="540" cy="440" r="9" fill="#f2540e" fill-opacity="0.5"/>
  </g>
  <!-- lightning bolt for "instant" -->
  <g fill="#ffa366" opacity="0.9">
    <path d="M410 240 l-38 62 h24 l-16 58 l52 -70 h-26 z"/>
  </g>

</svg>
