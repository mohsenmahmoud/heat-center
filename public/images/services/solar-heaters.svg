<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b1d08" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#101b28"/>
      <stop offset="100%" stop-color="#0a121c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.28" r="0.55">
      <stop offset="0%" stop-color="#f2540e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f2540e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04"/>
    </pattern>
    
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <rect width="800" height="600" fill="url(#glow)"/>


  <g stroke="#ff7a33" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- roof -->
    <path d="M120 430 L400 300 L680 430" />
    <!-- collector panel -->
    <g transform="translate(0,-6)">
      <path d="M330 360 L470 300 L560 335 L420 395 Z" fill="#101b28" fill-opacity="0.7"/>
      <line x1="360" y1="349" x2="450" y2="386"/>
      <line x1="393" y1="335" x2="483" y2="372"/>
      <line x1="426" y1="321" x2="516" y2="358"/>
    </g>
    <!-- tank -->
    <rect x="565" y="330" width="95" height="46" rx="23"/>
    <line x1="560" y1="353" x2="500" y2="353"/>
  </g>
  <g stroke="#ffa366" fill="none" stroke-width="5" stroke-linecap="round" opacity="0.85">
    <circle cx="250" cy="190" r="34" fill="#f2540e" fill-opacity="0.25"/>
    <line x1="250" y1="130" x2="250" y2="110"/>
    <line x1="196" y1="150" x2="182" y2="136"/>
    <line x1="304" y1="150" x2="318" y2="136"/>
    <line x1="176" y1="190" x2="156" y2="190"/>
  </g>
  <g stroke="#ffa366" stroke-width="3" stroke-dasharray="4 8" opacity="0.6">
    <line x1="270" y1="215" x2="400" y2="300"/>
    <line x1="250" y1="224" x2="440" y2="320"/>
  </g>

</svg>
